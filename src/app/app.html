<div class="app-container">
  <header class="app-header">
    <h1>📝 My To-Do App</h1>
    <p class="subtitle">Log, complete and clear. Keep it Simple</p>
  </header>

  <main class="app-main">
    <app-todo-form (onAddTodo)="onAddTodo($event)"></app-todo-form>
    <app-todo-list 
      [todos]="todos$ | async" 
      (onToggle)="onToggleTodo($event)"
      (onDelete)="onDeleteTodo($event)">
    </app-todo-list>
    <footer class="app-footer">
      <button (click)="onClearCompleted()" class="clear-btn">🗑️ Clear Completed</button>
    </footer>
  </main>
</div>
